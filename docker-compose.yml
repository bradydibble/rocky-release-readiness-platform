services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: r3p
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: r3p
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r3p"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      ADMIN_TOKEN: ${ADMIN_TOKEN:-changeme}
      SECRET_KEY: ${SECRET_KEY:-changeme}
      DATABASE_URL: postgresql+asyncpg://r3p:changeme@db:5432/r3p
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
